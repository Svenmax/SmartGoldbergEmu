name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and publish win-x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SmartGoldbergEmu.sln

      - name: Build
        run: dotnet build SmartGoldbergEmu.sln --configuration Release --no-restore

      - name: Publish self-contained single file
        run: >-
          dotnet publish SmartGoldbergEmu.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-build
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishDir=artifacts/publish/win-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartGoldbergEmu-win-x64
          path: artifacts/publish/win-x64/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/publish/win-x64/**
